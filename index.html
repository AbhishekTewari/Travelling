<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Primary SEO -->
    <title>Travel Log Book — Explore Travel Packages, Honeymoon Tours & Destination Guides</title>
    <meta name="description" content="Discover hand-picked travel packages, honeymoon destinations, and expert travel guides. Plan your dream vacation with curated experiences, premium stays, and 24/7 support." />
    <link rel="canonical" href="https://cpsgifts.in/" />

    <!-- ✅ Favicon -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- ✅ Open Graph -->
    <meta property="og:title" content="Travel Log Book — Travel Packages, Honeymoon Tours & Destination Guides" />
    <meta property="og:description" content="Discover hand-picked travel packages, honeymoon destinations, and expert travel guides. Plan your dream vacation today." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cpsgifts.in/" />
    <meta property="og:image" content="https://cpsgifts.in/og-image.jpg" />
    <meta property="og:locale" content="en_IN" />

    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Travel Log Book — Travel Packages & Destination Guides" />
    <meta name="twitter:description" content="Hand-picked travel packages, honeymoon tours, and expert guides. Book your dream vacation with Travel Log Book." />
    <meta name="twitter:image" content="https://cpsgifts.in/og-image.jpg" />

    <!-- ✅ Structured Data: Travel Agency -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Travel Log Book",
      "url": "https://cpsgifts.in/",
      "description": "Travel packages, honeymoon tours, and destination guides.",
      "telephone": "+91XXXXXXXXXX",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "sameAs": []
    }
    </script>

    <!-- ✅ Structured Data: BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://cpsgifts.in/"
        }
      ]
    }
    </script>

    <!-- ✅ Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Travel Log Book",
      "url": "https://cpsgifts.in/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://cpsgifts.in/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ✅ Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
